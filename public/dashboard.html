<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Signage CMS — Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #0c0d10;
    --bg-panel: #16181d;
    --bg-elevated: #1d2026;
    --bg-hover: #23262d;
    --border: #2a2d35;
    --text-primary: #edeef0;
    --text-muted: #8b8f99;
    --text-faint: #5b5f69;
    --accent: #ff8a3d;
    --accent-dim: #ff8a3d22;
    --live: #34d399;
    --live-dim: #34d39922;
    --pending: #f5c451;
    --pending-dim: #f5c45122;
    --danger: #f1565a;
    --danger-dim: #f1565a1c;
    --radius: 10px;
    --font-display: "Space Grotesk", sans-serif;
    --font-body: "Inter", -apple-system, sans-serif;
    --font-mono: "JetBrains Mono", monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
  }
  h1, h2, h3 { font-family: var(--font-display); margin: 0; }
  p { margin: 0; }
  button, input, select { font-family: inherit; font-size: inherit; color: inherit; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---------------- Layout shell ---------------- */
  #app-shell { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px; flex-shrink: 0; background: var(--bg-panel);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    padding: 20px 14px;
  }
  .brand { display: flex; align-items: center; gap: 8px; padding: 0 6px 22px; }
  .brand-mark {
    width: 22px; height: 22px; border-radius: 5px; background: var(--accent);
    position: relative; flex-shrink: 0;
  }
  .brand-mark::after {
    content: ""; position: absolute; inset: 6px; border-radius: 2px; background: var(--bg-base);
  }
  .brand-name { font-family: var(--font-display); font-weight: 700; font-size: 15px; letter-spacing: 0.02em; }

  .nav-item {
    display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;
    padding: 9px 10px; border-radius: 8px; border: none; background: transparent;
    color: var(--text-muted); cursor: pointer; font-weight: 500; margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); }
  .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.6; }

  .sidebar-spacer { flex: 1; }
  .account-box { border-top: 1px solid var(--border); padding-top: 12px; }
  .account-email {
    font-size: 12px; color: var(--text-muted); margin-bottom: 8px; word-break: break-all;
    font-family: var(--font-mono);
  }
  .btn-signout {
    width: 100%; padding: 7px 10px; border-radius: 7px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px;
  }
  .btn-signout:hover { color: var(--text-primary); border-color: var(--text-faint); }

  .main { flex: 1; padding: 28px 36px; max-width: 1100px; }
  .view-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px; gap: 16px; flex-wrap: wrap;
  }
  .view-header h1 { font-size: 20px; }
  .view-sub { color: var(--text-muted); font-size: 13px; margin-top: 3px; }

  /* ---------------- Buttons & inputs ---------------- */
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
    border-radius: 7px; border: 1px solid var(--border); background: var(--bg-elevated);
    color: var(--text-primary); cursor: pointer; font-weight: 500; font-size: 13px;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg-hover); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #16181d; font-weight: 600; }
  .btn-accent:hover { background: #ff9c5c; }
  .btn-danger { color: var(--danger); }
  .btn-danger:hover { background: var(--danger-dim); border-color: var(--danger); }
  .btn-ghost { background: transparent; border-color: transparent; padding: 6px 8px; }
  .btn-ghost:hover { background: var(--bg-hover); }
  .btn-sm { padding: 5px 9px; font-size: 12px; }
  .btn-icon { padding: 6px 8px; line-height: 1; }

  input[type="text"], input[type="email"], input[type="password"], input[type="number"], select {
    background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 7px;
    padding: 8px 10px; color: var(--text-primary); width: 100%;
  }
  input::placeholder { color: var(--text-faint); }
  input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus,
  input[type="number"]:focus, select:focus { border-color: var(--accent); }
  label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
  .field { margin-bottom: 12px; }

  /* ---------------- Auth screen ---------------- */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 0%, #1a1d24 0%, var(--bg-base) 60%);
  }
  .auth-card {
    width: 100%; max-width: 360px; background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 28px;
  }
  .auth-card .brand { padding: 0 0 22px; justify-content: center; }
  .auth-tabs { display: flex; border: 1px solid var(--border); border-radius: 8px; padding: 3px; margin-bottom: 18px; }
  .auth-tab {
    flex: 1; text-align: center; padding: 7px; border-radius: 6px; border: none;
    background: transparent; color: var(--text-muted); cursor: pointer; font-weight: 500; font-size: 13px;
  }
  .auth-tab.active { background: var(--bg-hover); color: var(--text-primary); }
  #auth-error {
    display: none; background: var(--danger-dim); color: var(--danger); border-radius: 7px;
    padding: 8px 10px; font-size: 12px; margin-bottom: 12px;
  }

  /* ---------------- Cards & grids ---------------- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .card {
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; display: flex; flex-direction: column;
  }
  .empty-state {
    border: 1px dashed var(--border); border-radius: var(--radius); padding: 36px 20px;
    text-align: center; color: var(--text-muted);
  }
  .empty-state strong { display: block; color: var(--text-primary); margin-bottom: 4px; font-weight: 600; }

  /* Media cards */
  .media-thumb { aspect-ratio: 16/10; background: #000; display: flex; align-items: center; justify-content: center; position: relative; }
  .media-thumb img, .media-thumb video { width: 100%; height: 100%; object-fit: cover; }
  .media-type-badge {
    position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6); color: #fff;
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em; padding: 3px 7px; border-radius: 5px;
    font-family: var(--font-mono);
  }
  .media-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .media-filename { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .media-meta { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .media-actions { display: flex; justify-content: flex-end; padding: 0 12px 10px; }

  /* Upload bar */
  .upload-bar {
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; display: flex; align-items: flex-end; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .upload-bar .field { margin-bottom: 0; min-width: 160px; }
  .upload-bar .field.grow { flex: 1; min-width: 220px; }

  /* Playlist cards */
  .playlist-card { padding: 16px; cursor: pointer; }
  .playlist-card:hover { border-color: var(--text-faint); }
  .playlist-card h3 { font-size: 15px; margin-bottom: 4px; }
  .playlist-card .count { color: var(--text-muted); font-size: 12px; }

  /* Playlist detail */
  .pl-item-row {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px;
  }
  .pl-item-thumb {
    width: 44px; height: 30px; border-radius: 4px; overflow: hidden; flex-shrink: 0; background: #000;
  }
  .pl-item-thumb img, .pl-item-thumb video { width: 100%; height: 100%; object-fit: cover; }
  .pl-item-info { flex: 1; min-width: 0; }
  .pl-item-name { font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pl-item-meta { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .pl-item-controls { display: flex; gap: 2px; }

  /* Display cards (monitor motif) */
  .display-card { padding: 0; }
  .display-screen {
    aspect-ratio: 16/10; background: #08090b; position: relative;
    display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid var(--border);
  }
  .status-dot {
    position: absolute; top: 10px; right: 10px; width: 9px; height: 9px; border-radius: 50%;
  }
  .status-dot.live { background: var(--live); box-shadow: 0 0 0 0 var(--live-dim); animation: pulse 2s infinite; }
  .status-dot.pending { background: var(--pending); }
  .status-dot.stale { background: var(--text-faint); }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
    70% { box-shadow: 0 0 0 7px rgba(52,211,153,0); }
    100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
  }
  .display-glyph { font-family: var(--font-mono); color: var(--text-faint); font-size: 11px; letter-spacing: 0.08em; }
  .display-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .display-name-row { display: flex; align-items: center; gap: 6px; }
  .display-name-row input { font-weight: 600; font-size: 14px; padding: 4px 6px; }
  .display-meta { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
  .display-footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-top: 1px solid var(--border); }

  .claim-bar {
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; display: flex; align-items: flex-end; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .claim-bar .field { margin-bottom: 0; }
  .claim-bar .field.code { width: 130px; }
  .claim-bar .field.name { width: 200px; }
  .claim-bar input { font-family: var(--font-mono); letter-spacing: 0.08em; }

  /* ---------------- Dialogs ---------------- */
  dialog {
    border: 1px solid var(--border); border-radius: 12px; background: var(--bg-panel);
    color: var(--text-primary); padding: 0; width: 100%; max-width: 380px;
  }
  dialog::backdrop { background: rgba(0,0,0,0.6); }
  .dialog-body { padding: 20px; }
  .dialog-body h2 { font-size: 16px; margin-bottom: 16px; }
  .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

  /* ---------------- Toasts ---------------- */
  #toast-root { position: fixed; bottom: 18px; right: 18px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
  .toast {
    background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; font-size: 13px; min-width: 200px; box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.success { border-color: var(--live); color: var(--live); }

  .back-link {
    display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted);
    background: none; border: none; cursor: pointer; font-size: 13px; padding: 0; margin-bottom: 14px;
  }
  .back-link:hover { color: var(--text-primary); }

  .hidden { display: none !important; }

  @media (max-width: 720px) {
    #app-shell { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; align-items: center; padding: 12px 14px; }
    .sidebar-spacer { display: none; }
    .account-box { display: none; }
    .brand { padding: 0 16px 0 0; }
    .main { padding: 20px; }
  }
</style>
</head>
<body>

<div id="toast-root"></div>

<!-- ===================== Auth screen ===================== -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">SIGNAGE CMS</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-mode="login">Sign in</button>
      <button class="auth-tab" data-mode="register">Create account</button>
    </div>
    <div id="auth-error"></div>
    <form id="auth-form">
      <div class="field">
        <label for="auth-email">Email</label>
        <input type="email" id="auth-email" required placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="auth-password">Password</label>
        <input type="password" id="auth-password" required placeholder="••••••••" minlength="6" />
      </div>
      <button type="submit" class="btn btn-accent" style="width:100%; justify-content:center;" id="auth-submit">Sign in</button>
    </form>
  </div>
</div>

<!-- ===================== App shell ===================== -->
<div id="app-shell" class="hidden">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">SIGNAGE CMS</div>
    </div>
    <button class="nav-item active" data-view="media"><span class="dot"></span> Media</button>
    <button class="nav-item" data-view="playlists"><span class="dot"></span> Playlists</button>
    <button class="nav-item" data-view="displays"><span class="dot"></span> Displays</button>
    <div class="sidebar-spacer"></div>
    <div class="account-box">
      <div class="account-email" id="account-email"></div>
      <button class="btn-signout" id="btn-signout">Sign out</button>
    </div>
  </aside>

  <main class="main">

    <!-- ---------- Media view ---------- -->
    <section id="view-media" class="view">
      <div class="view-header">
        <div>
          <h1>Media</h1>
          <div class="view-sub">Images and short videos available to use in playlists.</div>
        </div>
      </div>

      <form class="upload-bar" id="upload-form">
        <div class="field grow">
          <label for="upload-file">File</label>
          <input type="file" id="upload-file" accept="image/jpeg,image/png,image/webp,image/gif,video/mp4,video/webm,video/quicktime" required />
        </div>
        <div class="field">
          <label for="upload-duration">Image duration (sec)</label>
          <input type="number" id="upload-duration" value="10" min="1" max="600" />
        </div>
        <button type="submit" class="btn btn-accent" id="upload-submit">Upload</button>
      </form>

      <div id="media-grid"></div>
    </section>

    <!-- ---------- Playlists view ---------- -->
    <section id="view-playlists" class="view hidden">

      <div id="playlists-list-subview">
        <div class="view-header">
          <div>
            <h1>Playlists</h1>
            <div class="view-sub">Ordered sequences of media to assign to a display.</div>
          </div>
          <button class="btn btn-accent" id="btn-new-playlist">New playlist</button>
        </div>
        <div id="playlists-grid"></div>
      </div>

      <div id="playlist-detail-subview" class="hidden">
        <button class="back-link" id="btn-back-to-playlists">&larr; All playlists</button>
        <div class="view-header">
          <div>
            <h1 id="pl-detail-name"></h1>
            <div class="view-sub" id="pl-detail-sub"></div>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-sm" id="btn-rename-playlist">Rename</button>
            <button class="btn btn-sm btn-danger" id="btn-delete-playlist">Delete playlist</button>
          </div>
        </div>
        <div style="margin-bottom:14px;">
          <button class="btn btn-accent btn-sm" id="btn-add-media-to-playlist">Add media</button>
        </div>
        <div id="pl-items-list"></div>
      </div>

    </section>

    <!-- ---------- Displays view ---------- -->
    <section id="view-displays" class="view hidden">
      <div class="view-header">
        <div>
          <h1>Displays</h1>
          <div class="view-sub">Screens paired to this account. Open the player on a screen to get a pairing code.</div>
        </div>
      </div>

      <form class="claim-bar" id="claim-form">
        <div class="field code">
          <label for="claim-code">Pairing code</label>
          <input type="text" id="claim-code" placeholder="482913" maxlength="6" required />
        </div>
        <div class="field name">
          <label for="claim-name">Display name</label>
          <input type="text" id="claim-name" placeholder="Lobby Screen" required />
        </div>
        <button type="submit" class="btn btn-accent" id="claim-submit">Pair display</button>
      </form>

      <div id="displays-grid"></div>
    </section>

  </main>
</div>

<!-- ===================== Dialogs ===================== -->
<dialog id="modal-new-playlist">
  <div class="dialog-body">
    <h2>New playlist</h2>
    <form id="form-new-playlist">
      <div class="field">
        <label for="new-playlist-name">Name</label>
        <input type="text" id="new-playlist-name" placeholder="Lobby Loop" required />
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn" id="cancel-new-playlist">Cancel</button>
        <button type="submit" class="btn btn-accent">Create</button>
      </div>
    </form>
  </div>
</dialog>

<dialog id="modal-add-media">
  <div class="dialog-body">
    <h2>Add media to playlist</h2>
    <form id="form-add-media">
      <div class="field">
        <label for="add-media-select">Media</label>
        <select id="add-media-select" required></select>
      </div>
      <div class="field">
        <label for="add-media-duration">Duration override (sec, optional)</label>
        <input type="number" id="add-media-duration" min="1" max="600" placeholder="Use default" />
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn" id="cancel-add-media">Cancel</button>
        <button type="submit" class="btn btn-accent">Add</button>
      </div>
    </form>
  </div>
</dialog>

<script>
(function () {
  "use strict";

  /* ============================ State ============================ */
  let token = localStorage.getItem("signage_admin_token");
  let userEmail = localStorage.getItem("signage_admin_email");
  let mediaCache = [];
  let playlistsCache = [];
  let displaysCache = [];
  let currentPlaylistId = null;
  let authMode = "login";

  /* ============================ API helper ============================ */
  async function api(path, opts) {
    opts = opts || {};
    const headers = opts.headers || {};
    if (token) headers["Authorization"] = "Bearer " + token;
    if (opts.body && !(opts.body instanceof FormData)) {
      headers["Content-Type"] = "application/json";
      opts.body = JSON.stringify(opts.body);
    }
    const res = await fetch("/api" + path, Object.assign({}, opts, { headers }));
    if (res.status === 401) {
      signOut();
      throw new Error("Session expired — please sign in again.");
    }
    if (!res.ok) {
      let msg = "Request failed (" + res.status + ")";
      try { const data = await res.json(); if (data.error) msg = data.error; } catch (e) {}
      throw new Error(msg);
    }
    if (res.status === 204) return null;
    return res.json();
  }

  /* ============================ Toasts ============================ */
  function toast(message, type) {
    const root = document.getElementById("toast-root");
    const el = document.createElement("div");
    el.className = "toast" + (type ? " " + type : "");
    el.textContent = message;
    root.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  function timeAgo(dateStr) {
    if (!dateStr) return "never seen";
    const diffMs = Date.now() - new Date(dateStr).getTime();
    const sec = Math.floor(diffMs / 1000);
    if (sec < 10) return "just now";
    if (sec < 60) return sec + "s ago";
    const min = Math.floor(sec / 60);
    if (min < 60) return min + "m ago";
    const hr = Math.floor(min / 60);
    if (hr < 24) return hr + "h ago";
    return Math.floor(hr / 24) + "d ago";
  }

  function esc(str) {
    const d = document.createElement("div");
    d.textContent = str == null ? "" : String(str);
    return d.innerHTML;
  }

  /* ============================ Auth ============================ */
  const authScreen = document.getElementById("auth-screen");
  const appShell = document.getElementById("app-shell");

  document.querySelectorAll(".auth-tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      authMode = tab.dataset.mode;
      document.querySelectorAll(".auth-tab").forEach((t) => t.classList.toggle("active", t === tab));
      document.getElementById("auth-submit").textContent = authMode === "login" ? "Sign in" : "Create account";
      document.getElementById("auth-error").style.display = "none";
    });
  });

  document.getElementById("auth-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("auth-email").value.trim();
    const password = document.getElementById("auth-password").value;
    const errEl = document.getElementById("auth-error");
    const submitBtn = document.getElementById("auth-submit");
    errEl.style.display = "none";
    submitBtn.disabled = true;
    try {
      const path = authMode === "login" ? "/auth/login" : "/auth/register";
      const data = await api(path, { method: "POST", body: { email, password } });
      token = data.token;
      userEmail = data.user.email;
      localStorage.setItem("signage_admin_token", token);
      localStorage.setItem("signage_admin_email", userEmail);
      enterApp();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = "block";
    } finally {
      submitBtn.disabled = false;
    }
  });

  document.getElementById("btn-signout").addEventListener("click", signOut);

  function signOut() {
    token = null;
    localStorage.removeItem("signage_admin_token");
    localStorage.removeItem("signage_admin_email");
    appShell.classList.add("hidden");
    authScreen.classList.remove("hidden");
  }

  function enterApp() {
    authScreen.classList.add("hidden");
    appShell.classList.remove("hidden");
    document.getElementById("account-email").textContent = userEmail || "";
    switchView("media");
    refreshMedia();
    refreshPlaylists();
    refreshDisplays();
  }

  /* ============================ Nav ============================ */
  document.querySelectorAll(".nav-item").forEach((btn) => {
    btn.addEventListener("click", () => switchView(btn.dataset.view));
  });

  function switchView(name) {
    document.querySelectorAll(".nav-item").forEach((b) => b.classList.toggle("active", b.dataset.view === name));
    document.querySelectorAll(".view").forEach((v) => v.classList.add("hidden"));
    document.getElementById("view-" + name).classList.remove("hidden");
    if (name === "playlists") showPlaylistsList();
  }

  /* ============================ Media ============================ */
  async function refreshMedia() {
    try {
      mediaCache = await api("/media");
      renderMedia();
    } catch (err) {
      toast(err.message, "error");
    }
  }

  function renderMedia() {
    const grid = document.getElementById("media-grid");
    if (mediaCache.length === 0) {
      grid.innerHTML = '<div class="empty-state"><strong>No media yet</strong>Upload an image or short video above to start building a playlist.</div>';
      return;
    }
    grid.className = "grid";
    grid.innerHTML = mediaCache.map((m) => {
      const preview = m.type === "VIDEO"
        ? '<video src="' + esc(m.url) + '" preload="metadata" muted></video>'
        : '<img src="' + esc(m.url) + '" alt="" loading="lazy" />';
      const meta = m.type === "VIDEO" ? "video" : (m.durationSecs + "s");
      return (
        '<div class="card">' +
          '<div class="media-thumb">' + preview + '<span class="media-type-badge">' + m.type + '</span></div>' +
          '<div class="media-body">' +
            '<div class="media-filename" title="' + esc(m.filename) + '">' + esc(m.filename) + '</div>' +
            '<div class="media-meta">' + meta + ' &middot; ' + Math.round(m.sizeBytes / 1024) + ' KB</div>' +
          '</div>' +
          '<div class="media-actions"><button class="btn btn-ghost btn-icon btn-danger" data-delete-media="' + m.id + '" title="Delete">Delete</button></div>' +
        '</div>'
      );
    }).join("");
  }

  document.getElementById("media-grid").addEventListener("click", async (e) => {
    const btn = e.target.closest("[data-delete-media]");
    if (!btn) return;
    if (!confirm("Delete this media item? It will be removed from any playlists using it.")) return;
    try {
      await api("/media/" + btn.dataset.deleteMedia, { method: "DELETE" });
      toast("Media deleted", "success");
      refreshMedia();
    } catch (err) {
      toast(err.message, "error");
    }
  });

  document.getElementById("upload-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const fileInput = document.getElementById("upload-file");
    const file = fileInput.files[0];
    if (!file) return;
    const duration = document.getElementById("upload-duration").value || 10;
    const submitBtn = document.getElementById("upload-submit");
    submitBtn.disabled = true;
    submitBtn.textContent = "Uploading…";
    try {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("durationSecs", duration);
      await api("/media", { method: "POST", body: formData });
      toast("Uploaded", "success");
      fileInput.value = "";
      refreshMedia();
    } catch (err) {
      toast(err.message, "error");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Upload";
    }
  });

  /* ============================ Playlists ============================ */
  async function refreshPlaylists() {
    try {
      playlistsCache = await api("/playlists");
      renderPlaylistsList();
      if (currentPlaylistId) renderPlaylistDetail();
    } catch (err) {
      toast(err.message, "error");
    }
  }

  function renderPlaylistsList() {
    const grid = document.getElementById("playlists-grid");
    if (playlistsCache.length === 0) {
      grid.innerHTML = '<div class="empty-state"><strong>No playlists yet</strong>Create one, then add media to define what a display shows.</div>';
      return;
    }
    grid.className = "grid";
    grid.innerHTML = playlistsCache.map((p) =>
      '<div class="card playlist-card" data-open-playlist="' + p.id + '">' +
        '<h3>' + esc(p.name) + '</h3>' +
        '<div class="count">' + p.items.length + ' item' + (p.items.length === 1 ? "" : "s") + '</div>' +
      '</div>'
    ).join("");
  }

  document.getElementById("playlists-grid").addEventListener("click", (e) => {
    const card = e.target.closest("[data-open-playlist]");
    if (!card) return;
    currentPlaylistId = card.dataset.openPlaylist;
    showPlaylistDetail();
  });

  function showPlaylistsList() {
    currentPlaylistId = null;
    document.getElementById("playlists-list-subview").classList.remove("hidden");
    document.getElementById("playlist-detail-subview").classList.add("hidden");
  }

  function showPlaylistDetail() {
    document.getElementById("playlists-list-subview").classList.add("hidden");
    document.getElementById("playlist-detail-subview").classList.remove("hidden");
    renderPlaylistDetail();
  }

  document.getElementById("btn-back-to-playlists").addEventListener("click", showPlaylistsList);

  function renderPlaylistDetail() {
    const playlist = playlistsCache.find((p) => p.id === currentPlaylistId);
    if (!playlist) { showPlaylistsList(); return; }

    document.getElementById("pl-detail-name").textContent = playlist.name;
    document.getElementById("pl-detail-sub").textContent =
      playlist.items.length + " item" + (playlist.items.length === 1 ? "" : "s") + " &middot; plays in order, then loops".replace("&middot;", "·");

    const list = document.getElementById("pl-items-list");
    if (playlist.items.length === 0) {
      list.innerHTML = '<div class="empty-state"><strong>This playlist is empty</strong>Click "Add media" to add an image or video.</div>';
      return;
    }

    const sorted = playlist.items.slice().sort((a, b) => a.order - b.order);
    list.innerHTML = sorted.map((item, idx) => {
      const media = item.media;
      const preview = media.type === "VIDEO"
        ? '<video src="' + esc(media.url) + '" preload="metadata" muted></video>'
        : '<img src="' + esc(media.url) + '" alt="" />';
      const duration = item.durationOverride ?? media.durationSecs;
      const durLabel = media.type === "VIDEO" ? "video" : duration + "s";
      return (
        '<div class="pl-item-row">' +
          '<div class="pl-item-thumb">' + preview + '</div>' +
          '<div class="pl-item-info">' +
            '<div class="pl-item-name">' + esc(media.filename) + '</div>' +
            '<div class="pl-item-meta">' + (idx + 1) + ' of ' + sorted.length + ' &middot; ' + durLabel + '</div>' +
          '</div>' +
          '<div class="pl-item-controls">' +
            '<button class="btn btn-ghost btn-icon" data-move-up="' + item.id + '" ' + (idx === 0 ? "disabled" : "") + ' title="Move up">↑</button>' +
            '<button class="btn btn-ghost btn-icon" data-move-down="' + item.id + '" ' + (idx === sorted.length - 1 ? "disabled" : "") + ' title="Move down">↓</button>' +
            '<button class="btn btn-ghost btn-icon btn-danger" data-remove-item="' + item.id + '" title="Remove">✕</button>' +
          '</div>' +
        '</div>'
      );
    }).join("");
  }

  document.getElementById("pl-items-list").addEventListener("click", async (e) => {
    const playlist = playlistsCache.find((p) => p.id === currentPlaylistId);
    if (!playlist) return;
    const sorted = playlist.items.slice().sort((a, b) => a.order - b.order);
    const ids = sorted.map((i) => i.id);

    const upBtn = e.target.closest("[data-move-up]");
    const downBtn = e.target.closest("[data-move-down]");
    const removeBtn = e.target.closest("[data-remove-item]");

    try {
      if (upBtn) {
        const i = ids.indexOf(upBtn.dataset.moveUp);
        if (i > 0) [ids[i - 1], ids[i]] = [ids[i], ids[i - 1]];
        await api("/playlists/" + playlist.id + "/items/reorder", { method: "PATCH", body: { itemIds: ids } });
        await refreshPlaylists();
      } else if (downBtn) {
        const i = ids.indexOf(downBtn.dataset.moveDown);
        if (i < ids.length - 1) [ids[i + 1], ids[i]] = [ids[i], ids[i + 1]];
        await api("/playlists/" + playlist.id + "/items/reorder", { method: "PATCH", body: { itemIds: ids } });
        await refreshPlaylists();
      } else if (removeBtn) {
        await api("/playlists/" + playlist.id + "/items/" + removeBtn.dataset.removeItem, { method: "DELETE" });
        toast("Removed from playlist", "success");
        await refreshPlaylists();
      }
    } catch (err) {
      toast(err.message, "error");
    }
  });

  // New playlist modal
  const modalNewPlaylist = document.getElementById("modal-new-playlist");
  document.getElementById("btn-new-playlist").addEventListener("click", () => {
    document.getElementById("new-playlist-name").value = "";
    modalNewPlaylist.showModal();
  });
  document.getElementById("cancel-new-playlist").addEventListener("click", () => modalNewPlaylist.close());
  document.getElementById("form-new-playlist").addEventListener("submit", async (e) => {
    e.preventDefault();
    const name = document.getElementById("new-playlist-name").value.trim();
    try {
      await api("/playlists", { method: "POST", body: { name } });
      modalNewPlaylist.close();
      toast("Playlist created", "success");
      refreshPlaylists();
    } catch (err) {
      toast(err.message, "error");
    }
  });

  // Rename / delete playlist
  document.getElementById("btn-rename-playlist").addEventListener("click", async () => {
    const playlist = playlistsCache.find((p) => p.id === currentPlaylistId);
    if (!playlist) return;
    const name = prompt("Rename playlist", playlist.name);
    if (!name || name.trim() === "") return;
    try {
      await api("/playlists/" + playlist.id, { method: "PATCH", body: { name: name.trim() } });
      toast("Renamed", "success");
      refreshPlaylists();
    } catch (err) {
      toast(err.message, "error");
    }
  });

  document.getElementById("btn-delete-playlist").addEventListener("click", async () => {
    const playlist = playlistsCache.find((p) => p.id === currentPlaylistId);
    if (!playlist) return;
    if (!confirm('Delete "' + playlist.name + '"? Displays using it will show no content until reassigned.')) return;
    try {
      await api("/playlists/" + playlist.id, { method: "DELETE" });
      toast("Playlist deleted", "success");
      showPlaylistsList();
      refreshPlaylists();
    } catch (err) {
      toast(err.message, "error");
    }
  });

  // Add media modal
  const modalAddMedia = document.getElementById("modal-add-media");
  document.getElementById("btn-add-media-to-playlist").addEventListener("click", () => {
    const select = document.getElementById("add-media-select");
    if (mediaCache.length === 0) {
      toast("Upload some media first", "error");
      return;
    }
    select.innerHTML = mediaCache.map((m) =>
      '<option value="' + m.id + '">' + esc(m.filename) + " (" + m.type + ")</option>"
    ).join("");
    document.getElementById("add-media-duration").value = "";
    modalAddMedia.showModal();
  });
  document.getElementById("cancel-add-media").addEventListener("click", () => modalAddMedia.close());
  document.getElementById("form-add-media").addEventListener("submit", async (e) => {
    e.preventDefault();
    const mediaId = document.getElementById("add-media-select").value;
    const durationOverrideRaw = document.getElementById("add-media-duration").value;
    const durationOverride = durationOverrideRaw ? parseInt(durationOverrideRaw, 10) : undefined;
    try {
      await api("/playlists/" + currentPlaylistId + "/items", { method: "POST", body: { mediaId, durationOverride } });
      modalAddMedia.close();
      toast("Added to playlist", "success");
      refreshPlaylists();
    } catch (err) {
      toast(err.message, "error");
    }
  });

  /* ============================ Displays ============================ */
  async function refreshDisplays() {
    try {
      displaysCache = await api("/displays");
      renderDisplays();
    } catch (err) {
      toast(err.message, "error");
    }
  }

  function renderDisplays() {
    const grid = document.getElementById("displays-grid");
    if (displaysCache.length === 0) {
      grid.innerHTML = '<div class="empty-state"><strong>No displays paired yet</strong>Open the player on a screen, then enter the 6-digit code it shows above.</div>';
      return;
    }
    grid.className = "grid";
    const playlistOptions = playlistsCache.map((p) => '<option value="' + p.id + '">' + esc(p.name) + "</option>").join("");

    grid.innerHTML = displaysCache.map((d) => {
      const recentlySeen = d.lastSeenAt && (Date.now() - new Date(d.lastSeenAt).getTime() < 60000);
      const dotClass = d.status === "PAIRED" ? (recentlySeen ? "live" : "stale") : "pending";
      return (
        '<div class="card display-card">' +
          '<div class="display-screen">' +
            '<span class="status-dot ' + dotClass + '"></span>' +
            '<span class="display-glyph">' + (d.orientation || "landscape").toUpperCase() + '</span>' +
          '</div>' +
          '<div class="display-body">' +
            '<div class="display-name-row">' +
              '<input type="text" value="' + esc(d.name || "") + '" data-rename-display="' + d.id + '" placeholder="Unnamed display" />' +
            '</div>' +
            '<div class="display-meta">last seen ' + esc(timeAgo(d.lastSeenAt)) + '</div>' +
            '<select data-assign-playlist="' + d.id + '">' +
              '<option value="">No playlist assigned</option>' +
              playlistOptions +
            '</select>' +
          '</div>' +
          '<div class="display-footer">' +
            '<span class="display-meta">' + (dotClass === "live" ? "online" : dotClass === "pending" ? "awaiting pairing" : "offline") + '</span>' +
            '<button class="btn btn-ghost btn-sm btn-danger" data-remove-display="' + d.id + '">Remove</button>' +
          '</div>' +
        '</div>'
      );
    }).join("");

    // Set each select's current value via the DOM (more reliable than
    // baking a "selected" attribute into the HTML string above).
    displaysCache.forEach((d) => {
      const sel = grid.querySelector('select[data-assign-playlist="' + d.id + '"]');
      if (sel) sel.value = d.playlistId || "";
    });
  }

  document.getElementById("displays-grid").addEventListener("change", async (e) => {
    const select = e.target.closest("[data-assign-playlist]");
    if (!select) return;
    try {
      await api("/displays/" + select.dataset.assignPlaylist, { method: "PATCH", body: { playlistId: select.value || null } });
      toast("Display updated", "success");
      refreshDisplays();
    } catch (err) {
      toast(err.message, "error");
    }
  });

  document.getElementById("displays-grid").addEventListener("blur", async (e) => {
    const input = e.target.closest("[data-rename-display]");
    if (!input) return;
    const name = input.value.trim();
    if (!name) return;
    try {
      await api("/displays/" + input.dataset.renameDisplay, { method: "PATCH", body: { name } });
      toast("Renamed", "success");
    } catch (err) {
      toast(err.message, "error");
    }
  }, true);

  document.getElementById("displays-grid").addEventListener("click", async (e) => {
    const btn = e.target.closest("[data-remove-display]");
    if (!btn) return;
    if (!confirm("Remove this display? It will need to be re-paired with a new code.")) return;
    try {
      await api("/displays/" + btn.dataset.removeDisplay, { method: "DELETE" });
      toast("Display removed", "success");
      refreshDisplays();
    } catch (err) {
      toast(err.message, "error");
    }
  });

  document.getElementById("claim-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const pairingCode = document.getElementById("claim-code").value.trim();
    const name = document.getElementById("claim-name").value.trim();
    const submitBtn = document.getElementById("claim-submit");
    submitBtn.disabled = true;
    try {
      await api("/displays/claim", { method: "POST", body: { pairingCode, name } });
      toast("Display paired", "success");
      document.getElementById("claim-form").reset();
      refreshDisplays();
    } catch (err) {
      toast(err.message, "error");
    } finally {
      submitBtn.disabled = false;
    }
  });

  /* ============================ Periodic refresh ============================ */
  // Keep "last seen" / status indicators reasonably fresh while the dashboard is open.
  setInterval(() => { if (token) refreshDisplays(); }, 20000);

  /* ============================ Boot ============================ */
  if (token) enterApp();
})();
</script>
</body>
</html>
